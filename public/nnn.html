<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>فقاعة تفكير جايدر</title>
    <style>
      /* ==================== تنسيقات الـ CSS ==================== */

      body {
        background-color: #0f172a; /* خلفية داكنة */
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
      }

      /* الحاوية الأساسية للفقاعة والنقاط */
      .thinking-wrapper {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: flex-end; /* لترتيب العناصر من اليمين */
        transition: opacity 1s ease-out; /* تأثير الاختفاء التدريجي */
      }

      /* السحابة الكبيرة (صندوق الرسالة) */
      .thought-bubble {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        padding: 30px 45px;
        border-radius: 50px; /* شكل بيضاوي يشبه السحابة */
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        max-width: 400px;
        text-align: center;
        position: relative;
        transform: scale(0); /* تبدأ مخفية وتكبر بالأنيميشن */
        animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      /* النص داخل السحابة */
      .message-text {
        font-size: 2rem;
        color: #f8fafc;
        font-weight: bold;
        margin: 0;
        white-space: nowrap;
      }

      /* المؤشر اللامع */
      .cursor {
        color: #38bdf8;
        margin-right: 5px;
        animation: blink 0.7s infinite;
      }

      /* النقاط الثلاثة المتدرجة من اليمين وفوق */
      .dot {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 50%;
        position: absolute;
        transform: scale(0);
      }

      /* النقطة الكبيرة القريبة من السحابة */
      .dot1 {
        width: 25px;
        height: 25px;
        top: -20px;
        right: 40px;
        animation: popIn 0.4s 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)
          forwards;
      }

      /* النقطة المتوسطة */
      .dot2 {
        width: 15px;
        height: 15px;
        top: -40px;
        right: 25px;
        animation: popIn 0.4s 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275)
          forwards;
      }

      /* النقطة الصغيرة البعيدة */
      .dot3 {
        width: 8px;
        height: 8px;
        top: -55px;
        right: 15px;
        animation: popIn 0.4s forwards;
      }

      /* ==================== الأنيميشنز (Animations) ==================== */

      /* أنيميشن ظهور الفقاعات والنقاط بتأثير الارتداد (Pop) */
      @keyframes popIn {
        to {
          transform: scale(1);
        }
      }

      /* حركة المؤشر */
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="thinking-wrapper" id="bubble-wrapper">
      <div class="dot dot3"></div>
      <div class="dot dot2"></div>
      <div class="dot dot1"></div>

      <div class="thought-bubble">
        <p class="message-text">
          <span id="typing-text"></span><span class="cursor">|</span>
        </p>
      </div>
    </div>

    <script>
      const text = "أنا جايدر صديقك، أنا هنا لأجلك..";
      const typingElement = document.getElementById("typing-text");
      const bubbleWrapper = document.getElementById("bubble-wrapper");

      let index = 0;
      const speed = 100; // سرعة كتابة الحروف

      function typeWriter() {
        if (index < text.length) {
          typingElement.innerHTML += text.charAt(index);
          index++;
          setTimeout(typeWriter, speed);
        } else {
          // أول ما النص يخلص كتابة تماماً، بنشغل عداد الـ 5 ثواني للاختفاء
          setTimeout(fadeOutBubble, 5000);
        }
      }

      // دالة إخفاء الفقاعة بالكامل بشكل ناعم (Fade Out)
      function fadeOutBubble() {
        bubbleWrapper.style.opacity = "0";
      }

      // تشغيل تأثير الكتابة بعد ظهور السحابة (تأخير بسيط 600ms عشان الأنيميشن يكمل)
      setTimeout(typeWriter, 600);
    </script>
  </body>
</html>
