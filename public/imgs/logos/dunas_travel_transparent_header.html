<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TiT0 - Agent Design</title>
  <style>
    :root { --navy: #0d1730; --navy2: #152348; --red: #e1352f; --blue: #1f6fd6; --gold: #f4c542; --white: #ffffff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tahoma', 'Segoe UI', sans-serif;
      background: var(--navy);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .phone {
      position: relative;
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 900px;
      background: linear-gradient(180deg, #0a1228 0%, var(--navy) 60%, #050a18 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 60px 20px 40px;
      overflow: hidden;
    }
    .agent-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform .25s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .agent-wrap:active { transform: scale(0.96); }
    .figure-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: float 3s ease-in-out infinite;
    }
    .figure {
      width: 200px;
      filter: drop-shadow(0 10px 25px rgba(0,0,0,.45));
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .badge-label {
      margin-top: 20px;
      color: var(--gold);
      font-size: 14px;
      letter-spacing: 2px;
      opacity: .85;
      font-family: Tahoma, sans-serif;
    }
    @media (max-width:380px) {
      .figure { width: 170px; }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="agent-wrap">
      <div class="figure-wrap">
        <img class="figure" src="imgs/tito-mascot.png" alt="TiT0 mascot">
      </div>
    </div>
  </div>
</body>
</html>
