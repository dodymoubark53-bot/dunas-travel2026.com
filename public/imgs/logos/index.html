<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floating & Rotating Logos 3D</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: #0f172a;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .logos-container {
        position: relative;
        width: auto;
        display: flex;
        gap: 20px;
        justify-content: center;
        align-items: center;
        perspective: 1200px;
      }

      .floating-logo {
        width: 64px;
        height: 64px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 0;
        box-shadow: none;
        transform-style: preserve-3d;
        animation: floatAndRotate 7s ease-in-out infinite;
        transition: all 0.3s ease;
      }

      .floating-logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .floating-logo:hover {
        cursor: pointer;
      }

      @keyframes floatAndRotate {
        0% {
          transform: translateY(0px) rotateY(0deg) scale(0.95);
        }
        50% {
          transform: translateY(-15px) rotateY(180deg) scale(1.05);
        }
        100% {
          transform: translateY(0px) rotateY(360deg) scale(0.95);
        }
      }

      .logo-1 {
        animation-delay: 0s;
      }
      .logo-2 {
        animation-delay: 1.75s;
      }
      .logo-3 {
        animation-delay: 3.5s;
      }
      .logo-4 {
        animation-delay: 5.25s;
      }
    </style>
  </head>
  <body>
    <div class="logos-container">
      <div class="floating-logo logo-1">
        <img src="logo1.png" alt="Logo 1" />
      </div>
      <div class="floating-logo logo-2">
        <img src="logo2.png" alt="Logo 2" />
      </div>
      <div class="floating-logo logo-3">
        <img src="logo3.png" alt="Logo 3" />
      </div>
      <div class="floating-logo logo-4">
        <img src="logo4.png" alt="Logo 4" />
      </div>
    </div>
  </body>
</html>
