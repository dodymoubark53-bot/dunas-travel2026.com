<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تخصيص رحلتك | تجربة فاخرة بالطائرة المتحركة</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      :root {
        /* الألوان الرئيسية */
        --teal-accent: #00768c;
        --gold-accent: #ffd700;
        --blue-glow: #00e5ff;
        --bg-color: #f0f3f6;
        --card-bg: #ffffff;
        --text-main: #333333;
        --border-color: #dbe2e8;

        /* ألوان أيقونات Isometric الـ 3D */
        --whatsapp-top: #22d765;
        --whatsapp-side: #1db856;
        --phone-top: #55c760;
        --phone-side: #46a650;
        --facebook-top: #3b5999;
        --facebook-side: #2e477d;
        --instagram-gradient: linear-gradient(
          135deg,
          #e4405f,
          #b339ac,
          #f96d00
        );
        --instagram-gradient-side: linear-gradient(
          135deg,
          #ac2f46,
          #8e2b8b,
          #c15600
        );
      }

      * {
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-main);
        padding: 40px;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        background: var(--card-bg);
        padding: 50px;
        border-radius: 25px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
      }

      h2 {
        text-align: center;
        margin-bottom: 50px;
        font-size: 32px;
        font-weight: 700;
      }

      /* شريط الخطوات المتطور - تأثير الطائرة بالـ Slow Motion */
      .stepper-container {
        position: relative;
        max-width: 800px;
        margin: 0 auto 60px auto;
      }
      .progress-line {
        position: absolute;
        top: 25px;
        left: 10%;
        right: 10%;
        height: 2px;
        border-top: 3px dashed #b1c1ce;
        z-index: 0;
      }

      /* تصميم الطائرة الأساسي وتأثير الحركة البطيئة المخصص */
      .plane-icon {
        position: absolute;
        top: 10px;
        right: 11%; /* نقطة البداية فوق الخطوة الأولى */
        font-size: 28px;
        color: var(--teal-accent);
        z-index: 1;
        /* توجيه الماوس لليسار في البداية مع تفعيل الانتقال الانسيابي البطيء 1.5 ثانية */
        transform: scaleX(-1) translateY(0);
        transition:
          right 1.5s cubic-bezier(0.25, 1, 0.5, 1),
          transform 0.4s ease;
      }

      /* تفعيل المسار عند الانتقال للخطوة الثانية (Slow Motion للطيران لليسار مع تأثير ميلان خفيف للأعلى) */
      .stepper-container.step-2-active .plane-icon {
        right: 83%; /* تصل بدقة فوق الخطوة الثانية */
        transform: scaleX(-1) translateY(-5px) rotate(-5px);
      }

      /* تأثير الالتفاف عند العودة للخطوة الأولى */
      .stepper-container.returning .plane-icon {
        transform: scaleX(1) translateY(0); /* قلب اتجاه الطائرة لليمين أثناء العودة */
      }

      .stepper {
        display: flex;
        justify-content: space-between;
        position: relative;
        z-index: 2;
      }
      .step {
        text-align: center;
        width: 140px;
      }
      .step-number {
        width: 50px;
        height: 50px;
        line-height: 50px;
        border-radius: 50%;
        background: #e1e9f1;
        margin: 0 auto 12px auto;
        font-weight: bold;
        color: #7f8c8d;
        font-size: 18px;
        border: 3px solid #fff;
        transition: background 0.5s ease;
      }
      .step.active .step-number {
        background: var(--teal-accent);
        color: #fff;
        box-shadow: 0 0 15px rgba(0, 118, 140, 0.5);
      }
      .step-label {
        font-size: 15px;
        font-weight: 600;
      }
      .step.active .step-label {
        color: var(--teal-accent);
      }

      /* الاستمارات */
      .form-step {
        display: none;
      }
      .form-step.active {
        display: block;
      }

      /* كروت الوجهات الفاخرة */
      .destinations-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 30px;
        margin-bottom: 40px;
      }
      .destination-item {
        position: relative;
        height: 200px;
      }
      .destination-item input[type="checkbox"] {
        display: none;
      }
      .destination-item label {
        display: block;
        width: 100%;
        height: 100%;
        border: 3px solid var(--border-color);
        border-radius: 18px;
        overflow: hidden;
        cursor: pointer;
        position: relative;
        transition: all 0.4s ease;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
      }
      .destination-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease;
      }
      .destination-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.7) 0%,
          rgba(0, 0, 0, 0.2) 100%
        );
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1;
      }
      .destination-name {
        color: #ffffff;
        font-weight: 700;
        font-size: 22px;
        text-shadow: 0 2px 5px rgba(0, 0, 0, 0.6);
      }

      .destination-item label:hover {
        transform: translateY(-10px);
        border-color: var(--teal-accent);
        box-shadow: 0 0 30px rgba(0, 118, 140, 0.4);
      }
      .destination-item label:hover img {
        transform: scale(1.15);
      }
      .destination-item input[type="checkbox"]:checked + label {
        border-color: var(--teal-accent);
        box-shadow: 0 0 35px rgba(0, 118, 140, 0.6);
      }

      /* الفورم */
      .form-group {
        margin-bottom: 30px;
      }
      .form-row {
        display: flex;
        gap: 25px;
        flex-wrap: wrap;
      }
      .form-row .form-group {
        flex: 1;
        min-width: 280px;
      }
      label.field-label {
        display: block;
        margin-bottom: 10px;
        font-weight: 600;
        font-size: 15px;
        color: #444;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 15px;
        border: 1px solid var(--border-color);
        border-radius: 10px;
        font-size: 16px;
        outline: none;
        transition: 0.3s;
        background-color: #fafbfd;
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--teal-accent);
        box-shadow: 0 0 8px rgba(0, 118, 140, 0.3);
        background-color: #fff;
      }

      .dynamic-names-container {
        background: #fdfdfd;
        padding: 20px;
        border-radius: 10px;
        margin-top: 15px;
        border: 1px dashed #cbd5e1;
      }
      .dynamic-name-input {
        margin-bottom: 12px;
      }

      /* أزرار التحكم والرجوع */
      .btn-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 40px;
        border-top: 1px solid #e2e8f0;
        padding-top: 25px;
        position: relative;
      }
      .btn {
        padding: 14px 40px;
        border: none;
        border-radius: 10px;
        font-size: 17px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }
      .btn-next {
        background-color: var(--teal-accent);
        color: white;
        margin-right: auto;
      }
      .btn-next:hover {
        background-color: #006071;
        box-shadow: 0 5px 15px rgba(0, 118, 140, 0.4);
      }
      .btn-back {
        background-color: #e2e8f0;
        color: #334155;
        position: absolute;
        right: 0;
      }
      .btn-back:hover {
        background-color: #cbd5e1;
      }

      /* الزر الفاخر والمتوهج (Send Inquiry Now!) */
      .submit-wrapper {
        flex: 1;
        display: flex;
        justify-content: center;
        padding: 20px 0;
      }
      .btn-submit-glow {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px 70px;
        border: 4px solid var(--gold-accent);
        border-radius: 15px;
        background: var(--teal-accent);
        color: white;
        font-size: 36px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        position: relative;
        z-index: 1;
        box-shadow:
          0 0 20px rgba(0, 118, 140, 0.6),
          0 0 40px var(--blue-glow);
        transition: all 0.3s ease;
        animation: pulseGlow 1.8s infinite alternate;
      }
      .btn-submit-glow:hover {
        transform: scale(1.03);
        box-shadow:
          0 0 25px rgba(0, 118, 140, 0.8),
          0 0 60px var(--blue-glow);
      }

      @keyframes pulseGlow {
        0% {
          box-shadow:
            0 0 20px rgba(0, 118, 140, 0.6),
            0 0 40px var(--blue-glow);
          transform: translateY(0);
        }
        100% {
          box-shadow:
            0 0 30px rgba(0, 118, 140, 0.9),
            0 0 80px var(--blue-glow);
          transform: translateY(-5px);
        }
      }

      .error-msg {
        color: #e74c3c;
        font-size: 15px;
        margin-top: 12px;
        display: none;
        text-align: center;
      }

      /* قسم أيقونات التواصل الاجتماعي Isometric الـ 3D بالملي */
      .social-footer {
        margin-top: 60px;
        text-align: center;
        padding-top: 40px;
        border-top: 1px solid #e2e8f0;
      }
      .social-footer p {
        font-size: 16px;
        color: #64748b;
        margin-bottom: 60px;
        font-weight: 600;
      }

      .social-footer ul {
        position: relative;
        display: flex;
        justify-content: center;
        gap: 60px;
        list-style: none;
        padding-bottom: 50px;
        transform: rotate(-10deg) skew(10deg);
      }

      .social-footer ul li {
        position: relative;
        width: 90px;
        height: 90px;
      }

      .social-footer ul li a {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
        font-size: 2.8rem;
        text-decoration: none;
        transition: 0.5s ease;
        border-radius: 12px;
        box-shadow: -20px 20px 20px rgba(0, 0, 0, 0.08);
        z-index: 1;
      }

      .social-footer ul li a::before {
        content: "";
        position: absolute;
        top: 0;
        left: -18px;
        width: 18px;
        height: 100%;
        transition: 0.5s ease;
        transform: rotate(0deg) skewY(-45deg);
        transform-origin: right;
        border-radius: 12px 0 0 12px;
      }

      .social-footer ul li a::after {
        content: "";
        position: absolute;
        bottom: -18px;
        left: 0;
        width: 100%;
        height: 18px;
        transition: 0.5s ease;
        transform: rotate(0deg) skewX(-45deg);
        transform-origin: top;
        border-radius: 0 0 12px 12px;
      }

      .social-footer ul li.ts-whatsapp a {
        background: var(--whatsapp-top);
      }
      .social-footer ul li.ts-whatsapp a::before {
        background: var(--whatsapp-side);
      }
      .social-footer ul li.ts-whatsapp a::after {
        background: #55e18c;
      }

      .social-footer ul li.ts-phone a {
        background: var(--phone-top);
      }
      .social-footer ul li.ts-phone a::before {
        background: var(--phone-side);
      }
      .social-footer ul li.ts-phone a::after {
        background: #71cf7c;
      }

      .social-footer ul li.ts-facebook a {
        background: var(--facebook-top);
      }
      .social-footer ul li.ts-facebook a::before {
        background: var(--facebook-side);
      }
      .social-footer ul li.ts-facebook a::after {
        background: #4e6bb3;
      }

      .social-footer ul li.ts-instagram a {
        background: var(--instagram-gradient);
      }
      .social-footer ul li.ts-instagram a::before {
        background: var(--instagram-gradient-side);
      }
      .social-footer ul li.ts-instagram a::after {
        background: var(--instagram-gradient);
        opacity: 0.8;
      }

      .social-footer ul li:hover a {
        transform: translate(25px, -25px);
        box-shadow: -50px 50px 50px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>تخصيص رحلتك السياحية المخصصة</h2>

      <div class="stepper-container" id="stepperContainer">
        <div class="progress-line"></div>
        <div class="plane-icon" id="plane"><i class="fas fa-plane"></i></div>
        <div class="stepper">
          <div class="step active" id="step1-indicator">
            <div class="step-number">1</div>
            <div class="step-label">الوجهة السياحية</div>
          </div>
          <div class="step" id="step2-indicator">
            <div class="step-number">2</div>
            <div class="step-label">بيانات الرحلة</div>
          </div>
        </div>
      </div>

      <form
        id="tailorTripForm"
        onsubmit="
          event.preventDefault();
          alert('تم إرسال طلبك بنجاح! سنتواصل معك قريباً.');
        "
      >
        <div class="form-step active" id="step1">
          <h3 style="margin-bottom: 30px; text-align: center">
            أين ترغب في السفر؟ (يمكنك اختيار أكثر من بلد)
          </h3>
          <div class="destinations-grid">
            <div class="destination-item">
              <input
                type="checkbox"
                id="dest-egypt"
                name="destinations"
                value="مصر"
              />
              <label for="dest-egypt">
                <img
                  src="https://images.unsplash.com/photo-1503177119275-0aa32b3a9368?auto=format&fit=crop&w=600&q=80"
                  alt="مصر"
                />
                <div class="destination-overlay">
                  <div class="destination-name">مصر</div>
                </div>
              </label>
            </div>
            <div class="destination-item">
              <input
                type="checkbox"
                id="dest-dubai"
                name="destinations"
                value="دبي"
              />
              <label for="dest-dubai">
                <img
                  src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&w=600&q=80"
                  alt="دبي"
                />
                <div class="destination-overlay">
                  <div class="destination-name">دبي</div>
                </div>
              </label>
            </div>
            <div class="destination-item">
              <input
                type="checkbox"
                id="dest-turkey"
                name="destinations"
                value="تركيا"
              />
              <label for="dest-turkey">
                <img
                  src="https://images.unsplash.com/photo-1524231757912-21f4fe3a7200?auto=format&fit=crop&w=600&q=80"
                  alt="تركيا"
                />
                <div class="destination-overlay">
                  <div class="destination-name">تركيا</div>
                </div>
              </label>
            </div>
            <div class="destination-item">
              <input
                type="checkbox"
                id="dest-morocco"
                name="destinations"
                value="المغرب"
              />
              <label for="dest-morocco">
                <img
                  src="https://images.unsplash.com/photo-1539650116574-8efeb43e2750?auto=format&fit=crop&w=600&q=80"
                  alt="المغرب"
                />
                <div class="destination-overlay">
                  <div class="destination-name">المغرب</div>
                </div>
              </label>
            </div>
          </div>
          <p class="error-msg" id="dest-error">
            ⚠️ يرجى اختيار وجهة واحدة على الأقل للاستمرار.
          </p>

          <div class="btn-container">
            <button type="button" class="btn btn-next" onclick="goToStep(2)">
              الخطوة التالية
            </button>
          </div>
        </div>

        <div class="form-step" id="step2">
          <h3 style="margin-bottom: 30px">أدخل معلومات الاتصال والمسافرين</h3>

          <div class="form-row">
            <div class="form-group">
              <label class="field-label">الاسم الكامل *</label>
              <input
                type="text"
                required
                placeholder="الاسم كما هو في جواز السفر"
              />
            </div>
            <div class="form-group">
              <label class="field-label">البريد الإلكتروني *</label>
              <input type="email" required placeholder="name@example.com" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="field-label">الجنسية *</label>
              <select required>
                <option value="">اختر الجنسية...</option>
                <option value="Egyptian">مصرية</option>
                <option value="Saudi">سعودية</option>
                <option value="Emirati">إماراتية</option>
                <option value="Kuwaiti">كويتية</option>
                <option value="American">أمريكية</option>
              </select>
            </div>
            <div class="form-group">
              <label class="field-label">رقم الهاتف (يفضل واتساب) *</label>
              <input type="text" required placeholder="مثال: 00201xxxxxxxxx" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="field-label">تاريخ السفر المتوقع *</label>
              <input type="date" required id="expected-travel-date" />
            </div>
            <div class="form-group">
              <label class="field-label"
                >الميزانية التقريبية للشخص الواحد *</label
              >
              <select required>
                <option value="">حدد الميزانية والمتوقعة...</option>
                <option value="1000-2000">من 1000$ إلى 2000$</option>
                <option value="2000-3000">من 2000$ إلى 3000$</option>
                <option value="3000+">3000$ فأكثر</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="field-label">البالغين (+12 سنة)</label>
              <input
                type="number"
                id="count-adults"
                min="1"
                value="1"
                onchange="updatePassengerFields()"
              />
            </div>
            <div class="form-group">
              <label class="field-label">الأطفال (2 - 11 سنة)</label>
              <input
                type="number"
                id="count-children"
                min="0"
                value="0"
                onchange="updatePassengerFields()"
              />
            </div>
            <div class="form-group">
              <label class="field-label">الرضع (تحت سنتين)</label>
              <input
                type="number"
                id="count-infants"
                min="0"
                value="0"
                onchange="updatePassengerFields()"
              />
            </div>
          </div>

          <div
            class="form-group"
            id="passenger-names-section"
            style="display: none"
          >
            <label class="field-label">أسماء المسافرين والمرافقين:</label>
            <div class="dynamic-names-container" id="names-container"></div>
          </div>

          <div class="form-group">
            <label class="field-label">تفاصيل أو طلبات خاصة</label>
            <textarea rows="3" placeholder="أي تفاصيل إضافية..."></textarea>
          </div>

          <div class="btn-container">
            <button type="button" class="btn btn-back" onclick="goToStep(1)">
              رجوع
            </button>
            <div class="submit-wrapper">
              <button type="submit" class="btn-submit-glow">
                Send Inquiry Now!
              </button>
            </div>
          </div>
        </div>
      </form>

      <div class="social-footer">
        <p>بحاجة لمساعدة فورية؟ تواصل معنا عبر إحدى الوسائل التالية:</p>
        <ul>
          <li class="ts-whatsapp">
            <a href="https://wa.me/yournumber" target="_blank"
              ><i class="fab fa-whatsapp"></i
            ></a>
          </li>
          <li class="ts-phone">
            <a href="tel:002012345678"><i class="fas fa-phone"></i></a>
          </li>
          <li class="ts-facebook">
            <a href="https://facebook.com" target="_blank"
              ><i class="fab fa-facebook-f"></i
            ></a>
          </li>
          <li class="ts-instagram">
            <a href="https://instagram.com" target="_blank"
              ><i class="fab fa-instagram"></i
            ></a>
          </li>
        </ul>
      </div>
    </div>

    <script>
      function goToStep(stepNumber) {
        const stepperContainer = document.getElementById("stepperContainer");

        if (stepNumber === 2) {
          const checkboxes = document.querySelectorAll(
            'input[name="destinations"]:checked',
          );
          if (checkboxes.length === 0) {
            document.getElementById("dest-error").style.display = "block";
            return;
          } else {
            document.getElementById("dest-error").style.display = "none";
          }

          // إزالة كلاس العودة إن وُجد وتفعيل حركة الطيران السلو موشن لليسار
          stepperContainer.classList.remove("returning");
          stepperContainer.classList.add("step-2-active");

          document.getElementById("step1").classList.remove("active");
          document.getElementById("step2").classList.add("active");
          document.getElementById("step2-indicator").classList.add("active");
          updatePassengerFields();
        } else if (stepNumber === 1) {
          // تفعيل كلاس العودة لقلب اتجاه الطائرة أثناء رجوعها السلس لليمين
          stepperContainer.classList.add("returning");
          stepperContainer.classList.remove("step-2-active");

          document.getElementById("step2").classList.remove("active");
          document.getElementById("step1").classList.add("active");
          document.getElementById("step2-indicator").classList.remove("active");
        }
      }

      function updatePassengerFields() {
        const adults =
          parseInt(document.getElementById("count-adults").value) || 0;
        const children =
          parseInt(document.getElementById("count-children").value) || 0;
        const infants =
          parseInt(document.getElementById("count-infants").value) || 0;

        const container = document.getElementById("names-container");
        const section = document.getElementById("passenger-names-section");

        container.innerHTML = "";
        let totalPassengers = adults + children + infants;

        if (totalPassengers > 0) {
          section.style.display = "block";
          for (let i = 1; i <= adults; i++) {
            container.innerHTML += `<div class="dynamic-name-input"><input type="text" placeholder="اسم الشخص البالغ رقم ${i} *" required></div>`;
          }
          for (let i = 1; i <= children; i++) {
            container.innerHTML += `<div class="dynamic-name-input"><input type="text" placeholder="اسم الطفل رقم ${i} *" required></div>`;
          }
          for (let i = 1; i <= infants; i++) {
            container.innerHTML += `<div class="dynamic-name-input"><input type="text" placeholder="اسم الرضيع رقم ${i} *" required></div>`;
          }
        } else {
          section.style.display = "none";
        }
      }

      // Initialize dynamic travel date minimum to today's local date
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      const todayStr = `${yyyy}-${mm}-${dd}`;
      const dateInput = document.getElementById("expected-travel-date");
      if (dateInput) {
        dateInput.min = todayStr;
        
        // Add form submission check to prevent manual bypasses
        const form = document.getElementById("tailorTripForm");
        if (form) {
          form.addEventListener("submit", function(event) {
            if (dateInput.value && dateInput.value < todayStr) {
              event.preventDefault();
              alert("يرجى اختيار تاريخ سفر في المستقبل.");
            }
          });
        }
      }
    </script>
  </body>
</html>
